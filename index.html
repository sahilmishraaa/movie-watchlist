<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Watchlist</title>
    <link rel="stylesheet" href="movie.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" href="./images/film.png">
    <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">

        <!-- Hero Section -->
        <header class="hero">
            <div class="overlay">
                <h1>Find your film</h1>
                <a href="./watchlist.html">My Watchlist</a>
            </div>
        </header>

        <!-- Search -->
        <div class="search-box">
            <input id="movie-input" type="text" placeholder="Search for the Movie Name">
            <button id="search-btn">Search</button>
        </div>

        <!-- Movie List -->
        <section id="movie-list" class="movies">
            <br>
            <br>
            <br>
            <br>
            <br>
            <img src="./images/film-png.webp" style="margin-left: 200px ;width: 100px;" alt="">
            <p style="margin-left: 200px; color:gray">Start Exploring!</p>
        </section>
        <script type="module" src="movie.js"></script>
    </div>

</body>

</html>
